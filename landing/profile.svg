<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
  <defs>
    <!-- Noise texture -->
    <filter id="noise" x="0%" y="0%" width="100%" height="100%">
      <feTurbulence type="fractalNoise" baseFrequency="0.85" numOctaves="4" stitchTiles="stitch" result="noiseOut"/>
      <feColorMatrix type="saturate" values="0" in="noiseOut" result="grayNoise"/>
      <feBlend in="SourceGraphic" in2="grayNoise" mode="overlay" result="blended"/>
      <feComposite in="blended" in2="SourceGraphic" operator="in"/>
    </filter>
    <!-- Blue center glow -->
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#3b82f6" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#3b82f6" stop-opacity="0"/>
    </radialGradient>
    <!-- Clip to rounded square -->
    <clipPath id="roundedClip">
      <rect width="400" height="400" rx="72" ry="72"/>
    </clipPath>
  </defs>

  <g clip-path="url(#roundedClip)">
    <!-- Base background -->
    <rect width="400" height="400" fill="#080808"/>

    <!-- Dot grid -->
    <g fill="#1f1f1f">
      <rect x="40"  y="40"  width="2" height="2" rx="1"/>
      <rect x="80"  y="40"  width="2" height="2" rx="1"/>
      <rect x="120" y="40"  width="2" height="2" rx="1"/>
      <rect x="160" y="40"  width="2" height="2" rx="1"/>
      <rect x="200" y="40"  width="2" height="2" rx="1"/>
      <rect x="240" y="40"  width="2" height="2" rx="1"/>
      <rect x="280" y="40"  width="2" height="2" rx="1"/>
      <rect x="320" y="40"  width="2" height="2" rx="1"/>
      <rect x="360" y="40"  width="2" height="2" rx="1"/>

      <rect x="40"  y="80"  width="2" height="2" rx="1"/>
      <rect x="80"  y="80"  width="2" height="2" rx="1"/>
      <rect x="120" y="80"  width="2" height="2" rx="1"/>
      <rect x="160" y="80"  width="2" height="2" rx="1"/>
      <rect x="200" y="80"  width="2" height="2" rx="1"/>
      <rect x="240" y="80"  width="2" height="2" rx="1"/>
      <rect x="280" y="80"  width="2" height="2" rx="1"/>
      <rect x="320" y="80"  width="2" height="2" rx="1"/>
      <rect x="360" y="80"  width="2" height="2" rx="1"/>

      <rect x="40"  y="120" width="2" height="2" rx="1"/>
      <rect x="80"  y="120" width="2" height="2" rx="1"/>
      <rect x="120" y="120" width="2" height="2" rx="1"/>
      <rect x="160" y="120" width="2" height="2" rx="1"/>
      <rect x="200" y="120" width="2" height="2" rx="1"/>
      <rect x="240" y="120" width="2" height="2" rx="1"/>
      <rect x="280" y="120" width="2" height="2" rx="1"/>
      <rect x="320" y="120" width="2" height="2" rx="1"/>
      <rect x="360" y="120" width="2" height="2" rx="1"/>

      <rect x="40"  y="160" width="2" height="2" rx="1"/>
      <rect x="80"  y="160" width="2" height="2" rx="1"/>
      <rect x="120" y="160" width="2" height="2" rx="1"/>
      <rect x="160" y="160" width="2" height="2" rx="1"/>
      <rect x="200" y="160" width="2" height="2" rx="1"/>
      <rect x="240" y="160" width="2" height="2" rx="1"/>
      <rect x="280" y="160" width="2" height="2" rx="1"/>
      <rect x="320" y="160" width="2" height="2" rx="1"/>
      <rect x="360" y="160" width="2" height="2" rx="1"/>

      <rect x="40"  y="200" width="2" height="2" rx="1"/>
      <rect x="80"  y="200" width="2" height="2" rx="1"/>
      <rect x="120" y="200" width="2" height="2" rx="1"/>
      <rect x="160" y="200" width="2" height="2" rx="1"/>
      <rect x="200" y="200" width="2" height="2" rx="1"/>
      <rect x="240" y="200" width="2" height="2" rx="1"/>
      <rect x="280" y="200" width="2" height="2" rx="1"/>
      <rect x="320" y="200" width="2" height="2" rx="1"/>
      <rect x="360" y="200" width="2" height="2" rx="1"/>

      <rect x="40"  y="240" width="2" height="2" rx="1"/>
      <rect x="80"  y="240" width="2" height="2" rx="1"/>
      <rect x="120" y="240" width="2" height="2" rx="1"/>
      <rect x="160" y="240" width="2" height="2" rx="1"/>
      <rect x="200" y="240" width="2" height="2" rx="1"/>
      <rect x="240" y="240" width="2" height="2" rx="1"/>
      <rect x="280" y="240" width="2" height="2" rx="1"/>
      <rect x="320" y="240" width="2" height="2" rx="1"/>
      <rect x="360" y="240" width="2" height="2" rx="1"/>

      <rect x="40"  y="280" width="2" height="2" rx="1"/>
      <rect x="80"  y="280" width="2" height="2" rx="1"/>
      <rect x="120" y="280" width="2" height="2" rx="1"/>
      <rect x="160" y="280" width="2" height="2" rx="1"/>
      <rect x="200" y="280" width="2" height="2" rx="1"/>
      <rect x="240" y="280" width="2" height="2" rx="1"/>
      <rect x="280" y="280" width="2" height="2" rx="1"/>
      <rect x="320" y="280" width="2" height="2" rx="1"/>
      <rect x="360" y="280" width="2" height="2" rx="1"/>

      <rect x="40"  y="320" width="2" height="2" rx="1"/>
      <rect x="80"  y="320" width="2" height="2" rx="1"/>
      <rect x="120" y="320" width="2" height="2" rx="1"/>
      <rect x="160" y="320" width="2" height="2" rx="1"/>
      <rect x="200" y="320" width="2" height="2" rx="1"/>
      <rect x="240" y="320" width="2" height="2" rx="1"/>
      <rect x="280" y="320" width="2" height="2" rx="1"/>
      <rect x="320" y="320" width="2" height="2" rx="1"/>
      <rect x="360" y="320" width="2" height="2" rx="1"/>

      <rect x="40"  y="360" width="2" height="2" rx="1"/>
      <rect x="80"  y="360" width="2" height="2" rx="1"/>
      <rect x="120" y="360" width="2" height="2" rx="1"/>
      <rect x="160" y="360" width="2" height="2" rx="1"/>
      <rect x="200" y="360" width="2" height="2" rx="1"/>
      <rect x="240" y="360" width="2" height="2" rx="1"/>
      <rect x="280" y="360" width="2" height="2" rx="1"/>
      <rect x="320" y="360" width="2" height="2" rx="1"/>
      <rect x="360" y="360" width="2" height="2" rx="1"/>
    </g>

    <!-- Blue radial glow -->
    <rect width="400" height="400" fill="url(#glow)"/>

    <!-- Subtle top blue streak -->
    <rect x="0" y="0" width="400" height="2" fill="#3b82f6" opacity="0.6"/>

    <!-- Wordmark: "htt" white + "race" blue -->
    <!-- Using a geometric approach since custom fonts aren't available in SVG export -->
    <text
      x="200"
      y="222"
      text-anchor="middle"
      font-family="'Helvetica Neue', Arial, sans-serif"
      font-weight="800"
      font-size="88"
      letter-spacing="-4"
    >
      <tspan fill="#f0f0f0">htt</tspan><tspan fill="#3b82f6">race</tspan>
    </text>

    <!-- Subtle underline accent -->
    <rect x="112" y="244" width="176" height="3" rx="1.5" fill="#3b82f6" opacity="0.5"/>

    <!-- Noise overlay -->
    <rect width="400" height="400" fill="#080808" opacity="0.03" filter="url(#noise)"/>

    <!-- Border -->
    <rect width="400" height="400" rx="72" ry="72" fill="none" stroke="#1f1f1f" stroke-width="1.5"/>
  </g>
</svg>
