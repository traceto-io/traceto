<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Set Password — Httrace</title>
<link rel="icon" type="image/svg+xml" href="favicon.svg">
<meta name="robots" content="noindex">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=DM+Sans:wght@300;400;500&family=DM+Mono:wght@400&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #080808; --bg-2: #0e0e0e; --bg-3: #141414;
    --border: #1f1f1f; --border-2: #2a2a2a;
    --text: #f0f0f0; --text-muted: #666; --text-dim: #999;
    --accent: #3b82f6;
    --green: #22c55e; --red: #ef4444;
    --font-display: 'Syne', sans-serif;
    --font-body: 'DM Sans', sans-serif;
    --font-mono: 'DM Mono', monospace;
  }
  html, body { height: 100%; }
  body {
    background: var(--bg); color: var(--text);
    font-family: var(--font-body); font-size: 16px; line-height: 1.6;
    -webkit-font-smoothing: antialiased;
    display: flex; flex-direction: column; min-height: 100vh;
  }
  body::before {
    content: ''; position: fixed; inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='1'/%3E%3C/svg%3E");
    opacity: 0.025; pointer-events: none; z-index: 9999;
  }
  nav {
    display: flex; align-items: center;
    padding: 0 48px; height: 64px; border-bottom: 1px solid var(--border);
  }
  .nav-logo { font-family: var(--font-display); font-weight: 800; font-size: 18px; color: var(--text); text-decoration: none; }
  .nav-logo span { color: var(--accent); }
  main {
    flex: 1; display: flex; align-items: center; justify-content: center;
    padding: 40px 24px;
  }
  .card {
    width: 100%; max-width: 420px;
    background: var(--bg-2); border: 1px solid var(--border);
    border-radius: 16px; padding: 40px;
  }
  .card-label {
    font-family: var(--font-mono); font-size: 11px;
    letter-spacing: 0.14em; text-transform: uppercase;
    color: var(--accent); margin-bottom: 16px;
  }
  .card-title {
    font-family: var(--font-display); font-size: 28px;
    font-weight: 800; letter-spacing: -0.02em; margin-bottom: 8px;
  }
  .card-sub {
    font-size: 14px; color: var(--text-muted); line-height: 1.6;
    margin-bottom: 32px;
  }
  .field { margin-bottom: 16px; }
  label { font-size: 13px; color: var(--text-dim); display: block; margin-bottom: 8px; }
  input[type="password"] {
    width: 100%; padding: 12px 16px;
    background: var(--bg-3); border: 1px solid var(--border-2);
    border-radius: 8px; color: var(--text); font-size: 15px;
    font-family: var(--font-body); outline: none; transition: border-color 0.2s;
  }
  input[type="password"]:focus { border-color: var(--accent); }
  input[type="password"]::placeholder { color: var(--text-muted); }
  .btn {
    width: 100%; padding: 13px; margin-top: 24px;
    background: var(--accent); color: #fff;
    font-family: var(--font-display); font-size: 15px; font-weight: 700;
    border: none; border-radius: 8px; cursor: pointer;
    letter-spacing: -0.01em; transition: opacity 0.2s;
  }
  .btn:hover:not(:disabled) { opacity: 0.88; }
  .btn:disabled { opacity: 0.5; cursor: default; }
  .status {
    margin-top: 16px; padding: 12px 16px; border-radius: 8px;
    font-size: 14px; display: none;
  }
  .status.success { background: rgba(34,197,94,0.08); border: 1px solid rgba(34,197,94,0.2); color: var(--green); }
  .status.error { background: rgba(239,68,68,0.08); border: 1px solid rgba(239,68,68,0.2); color: var(--red); }
  .status.visible { display: block; }
  /* invalid token state */
  .invalid-msg { text-align: center; color: var(--text-muted); font-size: 14px; }
  .invalid-msg a { color: var(--accent); text-decoration: none; }
  .invalid-msg a:hover { text-decoration: underline; }
</style>
</head>
<body>

<nav>
  <a href="/" class="nav-logo">htt<span>race</span></a>
</nav>

<main>
  <div class="card" id="card">
    <!-- JS fills this in based on ?token= -->
  </div>
</main>

<script>
const API = 'https://api.httrace.com';
const card = document.getElementById('card');
const params = new URLSearchParams(window.location.search);
const token = params.get('token');

if (!token) {
  card.innerHTML = `
    <div class="invalid-msg">
      <p style="font-size:32px;margin-bottom:16px;">🔗</p>
      <p style="margin-bottom:12px;">This link is invalid or has already been used.</p>
      <a href="/forgot-password.html">Request a new link →</a>
    </div>`;
} else {
  card.innerHTML = `
    <div class="card-label">Account</div>
    <h1 class="card-title">Set your password</h1>
    <p class="card-sub">Choose a password for your Httrace account. At least 8 characters.</p>
    <form id="set-form" autocomplete="on">
      <div class="field">
        <label for="password">New password</label>
        <input type="password" id="password" name="password" placeholder="••••••••" required autocomplete="new-password" minlength="8">
      </div>
      <div class="field">
        <label for="confirm">Confirm password</label>
        <input type="password" id="confirm" name="confirm" placeholder="••••••••" required autocomplete="new-password" minlength="8">
      </div>
      <button type="submit" class="btn" id="submit-btn">Set password &amp; log in</button>
    </form>
    <div class="status" id="status"></div>`;

  const form = document.getElementById('set-form');
  const btn = document.getElementById('submit-btn');
  const status = document.getElementById('status');

  function showStatus(msg, type) {
    status.textContent = msg;
    status.className = `status ${type} visible`;
  }

  form.addEventListener('submit', async (e) => {
    e.preventDefault();
    const password = document.getElementById('password').value;
    const confirm = document.getElementById('confirm').value;

    if (password !== confirm) {
      showStatus('Passwords do not match.', 'error');
      return;
    }
    if (password.length < 8) {
      showStatus('Password must be at least 8 characters.', 'error');
      return;
    }

    btn.disabled = true;
    btn.textContent = 'Setting password…';
    status.className = 'status';

    try {
      const res = await fetch(`${API}/v1/auth/set-password`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ token, password }),
      });
      const data = await res.json().catch(() => ({}));
      if (res.ok) {
        localStorage.setItem('httrace_jwt', data.token);
        localStorage.setItem('httrace_email', data.email);
        showStatus('✓ Password set! Redirecting to your dashboard…', 'success');
        setTimeout(() => { window.location.href = '/dashboard.html'; }, 1200);
      } else {
        showStatus(data.detail || 'This link is invalid or expired. Please request a new one.', 'error');
        btn.disabled = false;
        btn.textContent = 'Set password & log in';
      }
    } catch (err) {
      showStatus('Network error. Please try again.', 'error');
      btn.disabled = false;
      btn.textContent = 'Set password & log in';
    }
  });
}
</script>
</body>
</html>
